version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: lure_mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lure_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lure_rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lure_network

  redis:
    image: redis:7-alpine
    container_name: lure_redis
    restart: unless-stopped
    networks:
      - lure_network

  minio:
    image: minio/minio:latest
    container_name: lure_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - lure_network

  minio-createbucket:
    image: minio/mc:latest
    container_name: lure_minio_setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc rm -r --force myminio/ecommerce-images || true;
      /usr/bin/mc mb myminio/ecommerce-images || true;
      /usr/bin/mc anonymous set public myminio/ecommerce-images;
      exit 0;
      "
    networks:
      - lure_network

  ai:
    build:
      context: ./AI
      dockerfile: Dockerfile
    container_name: lure_ai
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DB_NAME=ecommerce
      - FRONTEND_URL=http://localhost:9837
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./AI/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - lure_network

  celery_worker:
    build:
      context: ./AI
      dockerfile: Dockerfile
    container_name: lure_celery_worker
    command: celery -A workers.celery_app:celery_app worker --loglevel=info
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DB_NAME=ecommerce
      - FRONTEND_URL=http://localhost:9837
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./AI/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - lure_network

volumes:
  mongodb_data:
  prometheus_data:
  grafana_data:
  minio_data:

networks:
  lure_network:
    driver: bridge
