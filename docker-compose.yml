version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: lure_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lure_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lure_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATA_BASE_URL=mongodb://mongodb:27017/ecommerce
      - SECRET=supersecretkey12345
      - AI_API_URL=http://ai:8000/chat
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - FRONTEND_URL=http://localhost:9837
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - lure_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lure_frontend
    ports:
      - "9837:9837"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lure_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lure_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" 
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lure_network

  redis:
    image: redis:7-alpine
    container_name: lure_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - lure_network

  ai:
    build:
      context: ./AI
      dockerfile: Dockerfile
    container_name: lure_ai
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DB_NAME=ecommerce
      - FRONTEND_URL=http://localhost:9837
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - lure_network

  celery_worker:
    build:
      context: ./AI
      dockerfile: Dockerfile
    container_name: lure_celery_worker
    command: celery -A tasks worker --loglevel=info
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DB_NAME=ecommerce
      - FRONTEND_URL=http://localhost:9837
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - lure_network

volumes:
  mongodb_data:

networks:
  lure_network:
    driver: bridge
