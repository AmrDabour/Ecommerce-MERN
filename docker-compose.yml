version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: lure_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lure_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lure_backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATA_BASE_URL=mongodb://mongodb:27017/ecommerce
      - JWT_SECRET=supersecretkey12345
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - lure_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lure_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lure_network

volumes:
  mongodb_data:

networks:
  lure_network:
    driver: bridge
