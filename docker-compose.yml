version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: lure_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - lure_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lure_backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATA_BASE_URL=mongodb://mongodb:27017/ecommerce
      - JWT_SECRET=supersecretkey12345
      # Add other necessary backend environment variables here
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - lure_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lure_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - lure_network

volumes:
  mongodb_data:

networks:
  lure_network:
    driver: bridge
