version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lure_backend
    # We do NOT expose port 5000 to the outside in production, only Nginx or Cloudflare access it
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATA_BASE_URL=mongodb://mongodb:27017/ecommerce
      - SECRET=supersecretkey12345
      - AI_API_URL=http://ai:8000
      - MINIO_ENDPOINT=http://minio:9000
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - lure_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lure_frontend
    ports:
      - "9837:9837" # Exposing the frontend Nginx to the outside world
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lure_network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: lure_cloudflared
    restart: unless-stopped
    command: tunnel --url http://backend:5000
    depends_on:
      - backend
    networks:
      - lure_network
