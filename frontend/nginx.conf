# Define a rate limiting zone: 10 megabytes memory, 20 requests per second per IP
limit_req_zone $binary_remote_addr zone=mylimit:10m rate=20r/s;

server {
    # Apply rate limiting globally to this server
    # Burst allows up to 50 requests at once before returning 503
    limit_req zone=mylimit burst=50 nodelay;
    limit_req_status 429;

    listen 9837;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    # Enable gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Never cache index.html so Angular always gets the latest JS bundles
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        # First attempt to serve request as file, then
        # as directory, then fall back to displaying the index.html
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container
    location /api/ {
        # Use Docker's internal DNS resolver to avoid Nginx startup crashes if backend is not ready
        resolver 127.0.0.11 valid=30s;
        set $backend "http://backend:5000";
        
        # We need to rewrite /api/ to / because backend expects /
        # If your backend already expects /api/, you can remove the rewrite directive
        # But wait, earlier we saw backend expects /products, not /api/products
        rewrite ^/api/(.*) /$1 break;
        
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Cache only hashed JS/CSS assets (Angular adds hash to filenames automatically)
    location ~* \.(ico|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # JS and CSS: let browser revalidate (Angular uses content-hash in filenames)
    location ~* \.(js|css)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
