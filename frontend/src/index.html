<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Luxe Store — Premium Modern Essentials</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Discover premium electronics, audio gear, wearables, and home decor. Curated modern essentials for creators and everyday life." />
    <meta name="theme-color" content="#047857" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Prevent browser from caching this page -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Fonts: Inter (body) + DM Sans (display) — self-hosted via Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Clear stale caches from old deployments -->
    <script>
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(name) { caches.delete(name); });
        });
      }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(reg) { reg.unregister(); });
        });
      }
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
