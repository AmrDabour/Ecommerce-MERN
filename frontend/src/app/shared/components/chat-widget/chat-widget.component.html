<div class="chat-widget" [class.chat-widget--open]="isOpen()">
  
  <!-- Chat Button -->
  @if (!isOpen()) {
    <button class="chat-btn" (click)="toggleChat()" aria-label="Open Chat">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
    </button>
  }

  <!-- Chat Window -->
  @if (isOpen()) {
    <div class="chat-window">
      <div class="chat-header">
        <div class="chat-header__info">
          <div class="chat-header__avatar">AI</div>
          <div>
            <h3 class="chat-header__title">Luxe AI Support</h3>
            <span class="chat-header__status">Online</span>
          </div>
        </div>
        <button class="chat-close" (click)="toggleChat()" aria-label="Close Chat">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="chat-messages" #messagesContainer>
        @for (msg of messages(); track $index) {
          <div class="message" [class.message--user]="msg.sender === 'user'" [class.message--bot]="msg.sender === 'bot'">
            @if (msg.sender === 'bot') {
              <div class="message__avatar">AI</div>
            }
            <div class="message__content">
              <div class="message__text">{{ msg.text }}</div>
              <div class="message__time">{{ msg.time | date:'shortTime' }}</div>
            </div>
          </div>
        }
        
        @if (isTyping()) {
          <div class="message message--bot typing-indicator">
            <div class="message__avatar">AI</div>
            <div class="message__content">
              <div class="typing-dots">
                <span></span><span></span><span></span>
              </div>
            </div>
          </div>
        }
      </div>

      <div class="chat-input-area">
        <input 
          type="text" 
          class="chat-input" 
          placeholder="Type your message..." 
          [ngModel]="newMessage()" 
          (ngModelChange)="newMessage.set($event)"
          (keyup.enter)="sendMessage()"
        />
        <button class="chat-send" (click)="sendMessage()" [disabled]="!newMessage().trim() || isTyping()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  }
</div>
